<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comandas Pro · Día de la Cruz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-left">
      <svg class="clavel-svg" viewBox="0 0 72 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M36 88 C34 72 33 60 35 48 C36 42 36 36 36 30" stroke="#2d5a27" stroke-width="2" stroke-linecap="round"/>
        <path d="M35 62 C28 58 22 52 24 44 C28 50 32 55 36 58 C40 55 44 50 48 44 C50 52 44 58 37 62" fill="#c02020"/>
        <path d="M36 30 C20 30 10 15 15 5 C25 5 30 15 36 20 C42 15 47 5 57 5 C62 15 52 30 36 30Z" fill="#c02020"/>
      </svg>
      <div class="logo-text">
        <h1>Comandas Pro</h1>
        <p>Gestión de Inventario y Pedidos</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-group">
        <span class="stat-label">Pendientes</span>
        <span id="stat-pendientes" class="stat-val">0</span>
      </div>
      <button class="btn-pdf" id="btn-export-pdf">PDF Inventario</button>
    </div>
  </header>

  <nav class="tabs-main">
    <button class="tab-btn active" data-tab="comandas">Comandas</button>
    <button class="tab-btn" data-tab="stock">Inventario</button>
    <button class="tab-btn" data-tab="cola">Cola</button>
    <button class="tab-btn" data-tab="config">Configurar</button>
  </nav>

  <div id="panel-comandas" class="panel active">
    <div class="sub-tabs">
      <button class="sub-tab active" data-cat="plancha">Plancha</button>
      <button class="sub-tab" data-cat="cocina">Cocina</button>
      <button class="sub-tab" data-cat="cantidades">Cantidades</button>
      <button class="sub-tab" data-cat="avisos">Avisos</button>
    </div>

    <div class="comandas-layout">
      <div class="col-camareros">
        <p class="col-label">Camareros</p>
        <div id="lista-camareros-drag" class="camareros-grid-drag"></div>
      </div>
      <div class="col-platos">
        <p class="col-label">Platos de <span id="nombre-cat-actual">Plancha</span></p>
        <div id="lista-platos-drop" class="grid-platos-drop"></div>
      </div>
    </div>
  </div>

  <div id="panel-stock" class="panel">
    <div class="stock-header">
      <h2>Estado de Ingredientes</h2>
      <button class="btn-add" id="btn-nuevo-ingrediente">+ Nuevo Ingrediente</button>
    </div>
    <div id="lista-ingredientes" class="stock-grid"></div>
  </div>

  <div id="panel-cola" class="panel">
    <div class="cola-toolbar">
      <button class="btn-danger" id="btn-limpiar">Borrar entregados</button>
    </div>
    <div id="lista-cola" class="cola-list"></div>
  </div>

  <div id="panel-config" class="panel">
    <div class="config-grid">
      <div class="card">
        <p class="card-title">Camareros</p>
        <div id="tag-camareros" class="tag-cloud"></div>
        <div class="add-row">
          <input id="inp-camarero" class="add-input" placeholder="Nombre..." />
          <button class="btn-add" id="btn-add-camarero">Añadir</button>
        </div>
      </div>
      <div class="card">
        <p class="card-title">Platos</p>
        <div id="tag-platos" class="tag-cloud"></div>
        <div class="add-row">
          <select id="sel-cat-nueva" class="add-input">
            <option value="plancha">Plancha</option>
            <option value="cocina">Cocina</option>
            <option value="cantidades">Cantidades</option>
            <option value="avisos">Avisos</option>
          </select>
          <input id="inp-plato" class="add-input" placeholder="Nombre..." />
          <button class="btn-add" id="btn-add-plato">Añadir</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-stock" class="modal">
    <div class="modal-box">
      <h3 id="modal-title" class="modal-title">Configurar Ingrediente</h3>
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-field">
            <label class="modal-label">Nombre</label>
            <input id="mod-ing-nombre" class="add-input" />
          </div>
          <div class="modal-field" style="width: 80px;">
            <label class="modal-label">Unidad</label>
            <input id="mod-ing-unidad" class="add-input" placeholder="kg, l..." />
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label class="modal-label">Stock Actual</label>
            <input id="mod-ing-actual" type="number" step="0.01" class="add-input" />
          </div>
          <div class="modal-field">
            <label class="modal-label">Stock Inicial</label>
            <input id="mod-ing-inicial" type="number" step="0.01" class="add-input" />
          </div>
        </div>
        <p class="modal-subtitle">¿Cuánto consume cada plato? (0 = no consume)</p>
        <div id="modal-consumos" class="modal-consumos"></div>
        <div class="modal-actions">
          <button class="btn-danger" id="btn-modal-cancel">Cancelar</button>
          <button class="btn-add" id="btn-modal-save">Guardar</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
